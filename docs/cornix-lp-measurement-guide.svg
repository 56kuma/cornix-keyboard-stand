<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc4d"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#62d0ff"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7ab6"/>
    </marker>
    <style>
      .bg { fill: #10131a; }
      .panel { fill: #171b24; stroke: #2d3444; stroke-width: 2; }
      .case-top { fill: #3f4658; stroke: #8792a8; stroke-width: 2; }
      .case-side { fill: #303746; stroke: #8792a8; stroke-width: 2; }
      .case-front { fill: #252b37; stroke: #8792a8; stroke-width: 2; }
      .key { fill: #171b24; stroke: #a8b1c4; stroke-width: 1.2; }
      .dock { fill: none; stroke: #62d0ff; stroke-width: 4; }
      .dock-fill { fill: #182f3d; stroke: #62d0ff; stroke-width: 2; }
      .dim { stroke: #ffcc4d; stroke-width: 4; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dim-blue { stroke: #62d0ff; stroke-width: 4; marker-start: url(#arrowBlue); marker-end: url(#arrowBlue); }
      .dim-pink { stroke: #ff7ab6; stroke-width: 4; marker-start: url(#arrowPink); marker-end: url(#arrowPink); }
      .thin { stroke-width: 2.5; }
      .guide { stroke: #7d879a; stroke-width: 2; stroke-dasharray: 8 8; fill: none; }
      .label { fill: #f5f7fb; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 28px; font-weight: 700; }
      .small { fill: #c9d1df; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; }
      .tiny { fill: #9fa9bb; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; }
      .callout { fill: #ffcc4d; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 25px; font-weight: 800; }
      .callout-blue { fill: #62d0ff; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 25px; font-weight: 800; }
      .callout-pink { fill: #ff7ab6; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 25px; font-weight: 800; }
      .port { fill: #10131a; stroke: #ff7ab6; stroke-width: 3; }
      .switch { fill: #ff7ab6; stroke: #ffd2e8; stroke-width: 2; }
      .foot { fill: #0f1117; stroke: #62d0ff; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1000"/>
  <text x="56" y="62" class="label">Cornix LP Bento Dock: 実機採寸ガイド</text>
  <text x="56" y="100" class="small">短辺を下にして収納する前提。A/B/Cは必須、D〜Hがあると干渉逃げまで作れます。</text>

  <rect x="46" y="130" width="850" height="780" rx="18" class="panel"/>
  <rect x="930" y="130" width="420" height="780" rx="18" class="panel"/>

  <text x="78" y="176" class="label">1. 収納時の3D姿勢</text>
  <text x="78" y="214" class="small">この向きでノギスを当てる</text>

  <!-- Dock slot, stylized -->
  <path d="M 190 680 L 610 680 L 705 620 L 285 620 Z" class="dock-fill"/>
  <path d="M 205 620 L 285 570 L 285 620 L 190 680 Z" class="dock"/>
  <path d="M 610 680 L 705 620 L 705 570 L 625 620 Z" class="dock"/>
  <path d="M 285 570 L 705 570" class="dock"/>
  <text x="228" y="728" class="tiny">格子スタンドのスロット。短辺が底に入る</text>

  <!-- Isometric keyboard body -->
  <polygon points="265,285 680,225 790,505 365,575" class="case-top"/>
  <polygon points="365,575 790,505 790,610 365,680" class="case-front"/>
  <polygon points="265,285 365,575 365,680 265,390" class="case-side"/>
  <polygon points="265,285 680,225 790,505 365,575" fill="none" stroke="#d7dcea" stroke-width="3"/>

  <!-- Keys -->
  <g opacity="0.95">
    <rect x="342" y="327" width="55" height="42" rx="7" class="key" transform="rotate(-8 342 327)"/>
    <rect x="415" y="316" width="55" height="42" rx="7" class="key" transform="rotate(-8 415 316)"/>
    <rect x="488" y="305" width="55" height="42" rx="7" class="key" transform="rotate(-8 488 305)"/>
    <rect x="561" y="294" width="55" height="42" rx="7" class="key" transform="rotate(-8 561 294)"/>
    <rect x="360" y="389" width="55" height="42" rx="7" class="key" transform="rotate(-8 360 389)"/>
    <rect x="433" y="378" width="55" height="42" rx="7" class="key" transform="rotate(-8 433 378)"/>
    <rect x="506" y="367" width="55" height="42" rx="7" class="key" transform="rotate(-8 506 367)"/>
    <rect x="579" y="356" width="55" height="42" rx="7" class="key" transform="rotate(-8 579 356)"/>
    <rect x="378" y="451" width="55" height="42" rx="7" class="key" transform="rotate(-8 378 451)"/>
    <rect x="451" y="440" width="55" height="42" rx="7" class="key" transform="rotate(-8 451 440)"/>
    <rect x="524" y="429" width="55" height="42" rx="7" class="key" transform="rotate(-8 524 429)"/>
    <circle cx="668" cy="348" r="28" fill="#151922" stroke="#a8b1c4" stroke-width="2"/>
  </g>

  <!-- A: short edge -->
  <line x1="365" y1="705" x2="790" y2="635" class="dim"/>
  <line x1="365" y1="680" x2="365" y2="720" class="guide"/>
  <line x1="790" y1="610" x2="790" y2="650" class="guide"/>
  <text x="472" y="736" class="callout">A: KEYBOARD_SHORT_EDGE_CONTACT</text>
  <text x="472" y="765" class="tiny">短辺矩形部。スタンドのスロット長になる</text>

  <!-- B: thickness -->
  <line x1="802" y1="505" x2="802" y2="610" class="dim-blue"/>
  <text x="818" y="562" class="callout-blue">B: KEYBOARD_THICKNESS</text>
  <text x="818" y="592" class="tiny">収納時に溝へ入る厚み。実測: 10.0 mm</text>

  <!-- C: long edge contact rectangle -->
  <line x1="205" y1="265" x2="205" y2="682" class="dim"/>
  <line x1="250" y1="285" x2="190" y2="285" class="guide"/>
  <line x1="365" y1="680" x2="190" y2="680" class="guide"/>
  <text x="82" y="455" class="callout">C</text>
  <text x="82" y="487" class="small">長辺矩形部</text>
  <text x="82" y="517" class="tiny">実測: 144.0 mm</text>

  <!-- D USB port -->
  <rect x="276" y="435" width="18" height="54" rx="4" class="port"/>
  <line x1="294" y1="462" x2="155" y2="462" class="dim-pink thin"/>
  <text x="84" y="418" class="callout-pink">D: USB-C</text>
  <text x="84" y="449" class="tiny">端からの距離</text>
  <text x="84" y="476" class="tiny">高さ/幅/ケーブル逃げ</text>

  <!-- E switch -->
  <rect x="274" y="508" width="20" height="34" rx="4" class="switch"/>
  <line x1="294" y1="525" x2="155" y2="548" class="dim-pink thin"/>
  <text x="84" y="574" class="callout-pink">E: 電源スイッチ</text>
  <text x="84" y="604" class="tiny">端からの距離と操作逃げ</text>

  <!-- Right panel text -->
  <text x="960" y="176" class="label">測ってほしい距離</text>
  <text x="960" y="226" class="callout">A</text>
  <text x="1000" y="226" class="small">短辺外形長</text>
  <text x="1000" y="255" class="tiny">スロット長: KEYBOARD_SHORT_EDGE_CONTACT</text>

  <text x="960" y="306" class="callout-blue">B</text>
  <text x="1000" y="306" class="small">収納厚み</text>
  <text x="1000" y="335" class="tiny">底部溝: KEYBOARD_THICKNESS + 0.8mm / 高さ1mm</text>

  <text x="960" y="386" class="callout">C</text>
  <text x="1000" y="386" class="small">長辺矩形部</text>
  <text x="1000" y="415" class="tiny">全高55mm: KEYBOARD_LONG_EDGE_CONTACT / φ²</text>

  <text x="960" y="466" class="callout-pink">D</text>
  <text x="1000" y="466" class="small">USB-C位置</text>
  <text x="1000" y="495" class="tiny">切り欠き/ケーブル逃げ</text>

  <text x="960" y="546" class="callout-pink">E</text>
  <text x="1000" y="546" class="small">電源スイッチ位置</text>
  <text x="1000" y="575" class="tiny">収納したまま操作できる逃げ</text>

  <text x="960" y="626" class="callout-blue">F</text>
  <text x="1000" y="626" class="small">底面脚/ゴム足/ネジ</text>
  <text x="1000" y="655" class="tiny">スロット床の干渉逃げ</text>

  <text x="960" y="706" class="callout">G</text>
  <text x="1000" y="706" class="small">外形角丸半径</text>
  <text x="1000" y="735" class="tiny">スロット端の角落とし</text>

  <text x="960" y="786" class="callout-blue">H</text>
  <text x="1000" y="786" class="small">保護材厚み</text>
  <text x="1000" y="815" class="tiny">フェルト/TPU分を加算</text>

  <!-- Bottom view panel -->
  <text x="78" y="825" class="label">2. 短辺を下にした底面ビュー</text>
  <text x="78" y="858" class="small">F/G/Hはこの向きで見ると測りやすい</text>

  <rect x="365" y="803" width="345" height="120" rx="28" fill="#2c3342" stroke="#d7dcea" stroke-width="3"/>
  <rect x="390" y="833" width="65" height="26" rx="13" class="foot"/>
  <rect x="612" y="833" width="65" height="26" rx="13" class="foot"/>
  <circle cx="438" cy="891" r="12" class="foot"/>
  <circle cx="632" cy="891" r="12" class="foot"/>
  <line x1="438" y1="891" x2="632" y2="891" class="dim-blue thin"/>
  <text x="478" y="958" class="callout-blue">F: 底面脚/ゴム足/ネジ位置</text>
  <path d="M 365 831 Q 365 803 393 803" fill="none" class="dim thin"/>
  <text x="722" y="823" class="callout">G: 角丸R</text>
  <rect x="730" y="867" width="80" height="18" fill="#62d0ff" opacity="0.7"/>
  <line x1="730" y1="898" x2="810" y2="898" class="dim-blue thin"/>
  <text x="724" y="930" class="callout-blue">H: 保護材厚み</text>
</svg>
